name: expansion
description: Space expansion — космическая стратегия (iOS/Android).
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  go_router: ^17.1.0
  dio: ^5.9.2
  shared_preferences: ^2.5.4
  equatable: ^2.0.8
  dartz: ^0.10.1
  flutter_easylogger: ^2.3.3
  gap: ^3.0.1
  flutter_secure_storage: ^10.0.0
  logger: ^2.7.0
  flutter_svg: ^2.2.4
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  google_fonts: ^6.2.1
  sqflite: ^2.4.2
  path: ^1.9.1
  confetti: ^0.8.0
  audioplayers: ^6.1.0
  url_launcher: ^6.3.1
  yandex_mobileads: ^8.2.0
  in_app_purchase: ^3.3.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.6
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/splash.png
    - assets/images/
    - assets/images/bases/
    - assets/images/asteroids/
    - assets/images/hazards/
    - assets/images/explosion/
    - assets/svg/
    - assets/scenes/
    - assets/audio/
  fonts:
    - family: KellySlab
      fonts:
        - asset: assets/fonts/KellySlab-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png
  remove_alpha_ios: true

flutter_native_splash:
  background_image: assets/splash.png
  android_12:
    background_image: assets/splash.png

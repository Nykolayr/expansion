<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expansion — скоро</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: radial-gradient(ellipse at 50% 20%, #1a2744 0%, #0a0e17 55%, #050608 100%);
      color: #e8ecf4;
      padding: 24px;
    }
    main {
      text-align: center;
      max-width: 420px;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }
    p {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #9aa8c0;
    }
    .mark {
      display: inline-block;
      margin-bottom: 28px;
      font-size: 2.5rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">✦</div>
    <h1>Expansion</h1>
    <p>Сайт проектируется.<br>Скоро здесь будет что-то интересное.</p>
  </main>
</body>
</html>
